<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recipe</title>
    <link rel="stylesheet" href="view/style.css">
</head>
<body>

<header>
    <h1>Best Recipe App</h1>
    <nav>
        <button class="btn-secondary" onclick="window.location.href='/'">Back to Recipes</button>
    </nav>
</header>

<main>
    <section class="view-section">
        <h2>Create a New Recipe</h2>
        
        <form id="recipe-form">
            <div>
                <label for="title">Recipe Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div>
                <label for="instructions">Instructions</label>
                <textarea id="instructions" name="instructions" rows="6" required></textarea>
            </div>

            <button type="submit" id="saveRecipeBtn">Save Recipe</button>
        </form>
    </section>
</main>

<script src="/view/app.js"></script>
</body>
</html>
