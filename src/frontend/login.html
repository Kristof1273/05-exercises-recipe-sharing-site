<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Best Recipe App</h1>
    <nav>
        <button class="btn-secondary" onclick="window.location.href='registration.html'">Register</button>
    </nav>
</header>

<main>
    <section class="view-section">
        <h2>Login</h2>
        
        <form action="app.js" method="POST">
            
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" id="loginBtn">Login</button>

        </form>
        
        <div class="login-link">Don't have an account? <a href="registration.html">Register here</a></div>
    </section>
</main>

</body>
</html>
