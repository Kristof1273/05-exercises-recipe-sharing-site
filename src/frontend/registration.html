<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Best Recipe App</h1>
    <nav>
        <button class="btn-secondary" onclick="window.location.href='login.html'">Login</button>
    </nav>
</header>

<main>
    <section class="view-section">
        <h2>Register</h2>
        
        <form action="app.js" method="POST">
            
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div>
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>

            <div>
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" id="registerBtn">Create Account</button>

        </form>
        
        <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
    </section>
</main>

</body>
</html>
